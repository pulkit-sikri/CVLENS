<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candidate Login - CVLens</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="container auth-container animate-fade-in">
    <div class="text-end mb-3">
        <button id="theme-toggle" class="theme-toggle-btn ms-auto" title="Toggle Theme">
            <i id="theme-icon" class="bi bi-moon-fill"></i>
        </button>
    </div>

    <div class="glass-card p-5">
        <div class="text-center mb-4">
            <h2 class="navbar-brand fs-1 mb-1"><i class="bi bi-file-earmark-bar-graph"></i> CVLens</h2>
            <h4 class="fw-bold">Candidate Login</h4>
            <p class="text-custom-muted">Resume Keyword Match Evaluator</p>
        </div>

        <!-- Notification alerts -->
        <div th:if="${param.error}" class="alert alert-danger border-0 rounded-3" role="alert">
            <i class="bi bi-exclamation-triangle-fill me-2"></i> Invalid username or password.
        </div>
        <div th:if="${param.logout}" class="alert alert-success border-0 rounded-3" role="alert">
            <i class="bi bi-check-circle-fill me-2"></i> You have been successfully logged out.
        </div>
        <div th:if="${param.registered}" class="alert alert-success border-0 rounded-3" role="alert">
            <i class="bi bi-check-circle-fill me-2"></i> Registration successful! Please log in.
        </div>

        <form th:action="@{/login}" method="POST">
            <div class="mb-3">
                <label for="username" class="form-label fw-semibold">Username</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-end-0"><i class="bi bi-person text-muted"></i></span>
                    <input type="text" id="username" name="username" class="form-control border-start-0" placeholder="Enter username" required autofocus>
                </div>
            </div>

            <div class="mb-4">
                <label for="password" class="form-label fw-semibold">Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-end-0"><i class="bi bi-lock text-muted"></i></span>
                    <input type="password" id="password" name="password" class="form-control border-start-0" placeholder="Enter password" required>
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 mb-3 py-2">
                <i class="bi bi-box-arrow-in-right me-2"></i> Log In
            </button>
        </form>

        <div class="text-center mt-3 border-top pt-3">
            <p class="mb-2 text-custom-muted">Don't have an account? <a th:href="@{/register}" class="text-decoration-none fw-bold text-primary">Register as User</a></p>
            <p class="mb-0 text-custom-muted">Are you an administrator? <a th:href="@{/admin/login}" class="text-decoration-none fw-bold text-danger">Login as Admin</a></p>
        </div>
    </div>
</div>

<!-- Theme toggle JS -->
<script th:src="@{/js/theme.js}"></script>
<!-- Bootstrap Bundle JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
