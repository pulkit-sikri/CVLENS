<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candidate Registration - CVLens</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="container auth-container animate-fade-in">
    <div class="text-end mb-3">
        <button id="theme-toggle" class="theme-toggle-btn ms-auto" title="Toggle Theme">
            <i id="theme-icon" class="bi bi-moon-fill"></i>
        </button>
    </div>

    <div class="glass-card p-5">
        <div class="text-center mb-4">
            <h2 class="navbar-brand fs-1 mb-1"><i class="bi bi-person-plus-fill"></i> CVLens</h2>
            <h4 class="fw-bold">User Registration</h4>
            <p class="text-custom-muted">Analyze and score your resume keywords</p>
        </div>

        <form th:action="@{/register}" th:object="${user}" method="POST">
            <div class="mb-3">
                <label for="username" class="form-label fw-semibold">Username</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-end-0"><i class="bi bi-person text-muted"></i></span>
                    <input type="text" id="username" th:field="*{username}" class="form-control border-start-0" placeholder="Create username" required>
                </div>
                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
            </div>

            <div class="mb-3">
                <label for="email" class="form-label fw-semibold">Email Address</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-end-0"><i class="bi bi-envelope text-muted"></i></span>
                    <input type="email" id="email" th:field="*{email}" class="form-control border-start-0" placeholder="name@example.com" required>
                </div>
                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
            </div>

            <div class="mb-4">
                <label for="password" class="form-label fw-semibold">Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-end-0"><i class="bi bi-lock text-muted"></i></span>
                    <input type="password" id="password" th:field="*{password}" class="form-control border-start-0" placeholder="Minimum 6 characters" required>
                </div>
                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
            </div>

            <button type="submit" class="btn btn-primary w-100 mb-3 py-2">
                <i class="bi bi-person-check me-2"></i> Register Account
            </button>
        </form>

        <div class="text-center mt-3 border-top pt-3">
            <p class="mb-0 text-custom-muted">Already have an account? <a th:href="@{/login}" class="text-decoration-none fw-bold text-primary">Login Here</a></p>
        </div>
    </div>
</div>

<!-- Theme toggle JS -->
<script th:src="@{/js/theme.js}"></script>
<!-- Bootstrap Bundle JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
