<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - CVLens</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="container auth-container animate-fade-in text-center">
    <div class="text-end mb-3">
        <button id="theme-toggle" class="theme-toggle-btn ms-auto" title="Toggle Theme">
            <i id="theme-icon" class="bi bi-moon-fill"></i>
        </button>
    </div>

    <div class="glass-card p-5">
        <div class="mb-4">
            <div class="display-1 fw-bold text-danger mb-2">
                <i class="bi bi-exclamation-circle-fill"></i>
            </div>
            <h1 class="fw-bold" th:text="${status != null ? status : 'Error'}">500</h1>
            <h3 class="text-custom-muted mb-3" th:text="${error != null ? error : 'An unexpected error occurred'}">Internal Server Error</h3>
            
            <div class="p-3 bg-light-subtle rounded border text-custom-muted text-wrap font-monospace mb-4" style="font-size: 0.9rem;">
                <span th:text="${message != null and message != '' ? message : 'No details available.'}">Error details</span>
            </div>
        </div>

        <div class="d-grid gap-2">
            <a href="/dashboard" class="btn btn-primary py-2">
                <i class="bi bi-house-door-fill me-2"></i> Back to Dashboard
            </a>
        </div>
    </div>
</div>

<!-- Theme toggle JS -->
<script th:src="@{/js/theme.js}"></script>
<!-- Bootstrap Bundle JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
