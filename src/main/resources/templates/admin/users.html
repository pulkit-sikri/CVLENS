<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users Registry - CVLens</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg custom-navbar sticky-top">
    <div class="container">
        <a class="navbar-brand fs-3" th:href="@{/admin/dashboard}"><i class="bi bi-file-earmark-bar-graph text-danger"></i> CVLens Admin</a>
        <div class="ms-auto d-flex align-items-center">
            <button id="theme-toggle" class="theme-toggle-btn me-3" title="Toggle Theme">
                <i id="theme-icon" class="bi bi-moon-fill"></i>
            </button>
            <a th:href="@{/admin/dashboard}" class="btn btn-outline-danger btn-sm px-3 rounded-pill">
                <i class="bi bi-arrow-left"></i> Console
            </a>
        </div>
    </div>
</nav>

<div class="container my-5 animate-fade-in">
    <div class="mb-4">
        <h2 class="fw-bold">User Registry</h2>
        <p class="text-custom-muted">Auditing dashboard showing all registered candidates and system administrators.</p>
    </div>

    <div class="custom-card p-4">
        <h4 class="fw-bold mb-3"><i class="bi bi-people text-primary"></i> Registered Accounts</h4>
        
        <div class="table-responsive mt-3">
            <table class="table custom-table align-middle">
                <thead>
                    <tr>
                        <th>Account ID</th>
                        <th>Username</th>
                        <th>Email Address</th>
                        <th>System Role</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="user : ${users}">
                        <td th:text="${user.id}">101</td>
                        <td>
                            <strong th:text="${user.username}">Username</strong>
                        </td>
                        <td th:text="${user.email}">user@example.com</td>
                        <td>
                            <span class="badge py-1 px-3 rounded-pill text-white" 
                                  th:classappend="${user.role == 'ROLE_ADMIN' ? 'bg-danger' : 'bg-primary'}"
                                  th:text="${user.role}">
                                ROLE_USER
                            </span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Theme toggle JS -->
<script th:src="@{/js/theme.js}"></script>
<!-- Bootstrap Bundle JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
